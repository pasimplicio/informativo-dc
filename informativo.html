<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Informativo DC — Diretoria Comercial CAEMA</title>
<meta name="description" content="Acompanhamento diário dos indicadores comerciais.">
<link rel="stylesheet" href="estilo.css">
</head>
<body>

<header class="topo">
  <div class="topo-marca">
    <h1>Informativo DC</h1>
    <p id="topo-meta">Diretoria Comercial · CAEMA</p>
  </div>

  <div class="topo-conta">
    <span id="selo-exemplo" class="selo-exemplo" hidden>dados de demonstração</span>
    <span id="topo-email" class="topo-email"></span>
    <button id="btn-sair" class="botao-sair" type="button" hidden>
      <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
        <path d="M15 12H4m0 0l3.5-3.5M4 12l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 7V5.5A1.5 1.5 0 0 1 11.5 4h6A1.5 1.5 0 0 1 19 5.5v13a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 10 18.5V17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Sair
    </button>
    <a id="link-entrar" class="botao-sair" href="/" hidden>Entrar</a>
  </div>
</header>

<main class="palco">
  <div class="celular" role="region" aria-label="Informativo da Diretoria Comercial">
    <div class="celular-tela">

      <!-- Lista de conversas -->
      <section id="tela-lista" class="tela tela-ativa" aria-label="Lista de conversas">
        <header class="wa-topo wa-topo-lista">
          <span class="wa-titulo">Informativo DC</span>
          <!-- Decorativos: fazem parte da imitação do WhatsApp. Sair e conta
               ficam no cabeçalho da página, fora da maquete. -->
          <span class="wa-topo-icones" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
          </span>
        </header>
        <ul id="lista-conversas" class="conversas"></ul>
        <p id="atualizado" class="atualizado"></p>
      </section>

      <!-- Conversa -->
      <section id="tela-conversa" class="tela" aria-label="Conversa">
        <header class="wa-topo">
          <button id="btn-voltar" class="wa-voltar" type="button" aria-label="Voltar para a lista">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span id="conversa-avatar" class="avatar avatar-pequeno"></span>
          <span class="wa-topo-info">
            <span id="conversa-nome" class="wa-topo-nome"></span>
            <span id="conversa-sub" class="wa-topo-sub"></span>
          </span>
        </header>
        <div id="thread" class="thread" tabindex="0"></div>
        <div class="wa-barra-entrada" aria-hidden="true">
          <span class="wa-campo">Mensagem</span>
          <span class="wa-enviar">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M3.5 12l16-8-6.5 8 6.5 8z" fill="currentColor"/></svg>
          </span>
        </div>
      </section>

    </div>
  </div>
</main>

<!-- Confirmação de saída. Nível de página, não dentro da maquete. -->
<div id="folha-sair" class="folha-fundo" hidden>
  <div class="folha" role="alertdialog" aria-modal="true"
       aria-labelledby="folha-titulo" aria-describedby="folha-texto">
    <h2 id="folha-titulo">Sair do informativo?</h2>
    <p id="folha-texto">Você precisará entrar novamente com sua conta corporativa para consultar os informativos.</p>
    <div class="folha-acoes">
      <button id="folha-cancelar" class="folha-botao" type="button">Cancelar</button>
      <button id="folha-confirmar" class="folha-botao folha-botao-perigo" type="button">Sair</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script src="conta.js"></script>
</body>
</html>
